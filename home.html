<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIANSPACE</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cn-fontsource-smiley-sans-oblique-regular/font.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #aaa;
  font-family: "Smiley Sans Oblique", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  display: flex;
  min-height: 100vh;
  animation: fadeIn 0.5s ease;
}
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ====== sidebar ====== */
aside {
  position: fixed;
  left: 0; top: 0; bottom: 0;
  width: 240px;
  background: #0d0d0d;
  border-right: 1px solid #1a1a1a;
  padding: 2.5rem 1.5rem;
  overflow: visible;
  z-index: 100;
  transition: width 0.8s ease;
}
aside.collapsed { width: 40px; padding: 2.5rem 0.5rem; overflow: hidden; }
aside.collapsed nav { opacity:0; transform:translateX(-100px); pointer-events:none; width:200px; white-space:nowrap; }
aside nav { transition:opacity 0.5s ease 0.1s, transform 0.5s ease 0.1s; }
aside.collapsed #logo { display:none; }
#sidebarToggle {
  position: fixed;
  left: 240px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 101;
  width: 18px; height: 56px;
  background: #8B5CF6;
  border: 1px solid #8B5CF6;
  border-radius: 0 6px 6px 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 0.7rem;
  text-shadow: 0 0 8px #fff;
  transition: left 0.8s ease, color 0.15s;
  user-select: none;
}
#sidebarToggle:hover { background: #a78bfa; border-color: #a78bfa; }
#sidebarToggle.shifted { left: 40px; }
#logo { position:fixed; left:1.5rem; top:2.5rem; width:190px; cursor:pointer; user-select:none; filter:drop-shadow(0 0 0 transparent); transition:filter 1.8s ease, left 0.8s ease, width 0.8s ease; z-index:105; }
#logo .char { fill:#8B5CF6; }
#logo.done { filter:drop-shadow(0 0 1px #fff) drop-shadow(0 0 3px #8B5CF6); }
@keyframes breathe { 0%,100%{filter:drop-shadow(0 0 0 transparent)} 50%{filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 4px #8B5CF6) drop-shadow(0 0 8px #a78bfa)} }
#logo.breathing { animation:breathe 3s ease-in-out infinite; will-change:filter; }
#maskLayer .char { fill:black; stroke:white; stroke-width:80; stroke-linecap:round; stroke-linejoin:round; animation:draw 0.8s ease forwards; }
#maskLayer .char:nth-child(1){animation-delay:2.4s}
#maskLayer .char:nth-child(2){animation-delay:1.8s}
#maskLayer .char:nth-child(3){animation-delay:1.5s}
#maskLayer .char:nth-child(4){animation-delay:0.3s}
#maskLayer .char:nth-child(5){animation-delay:1.2s}
#maskLayer .char:nth-child(6){animation-delay:0s}
#maskLayer .char:nth-child(7){animation-delay:0.6s}
#maskLayer .char:nth-child(8){animation-delay:0.9s}
#maskLayer .char:nth-child(9){animation-delay:2.1s}
@keyframes draw { to{stroke-dashoffset:0} }
aside h1 {
  font-size: 2.1rem;
  letter-spacing: 0.15em;
  color: #8B5CF6;
  margin-bottom: 1.5rem;
  cursor: pointer;
  user-select: none;
  transition: color 0.15s;
}
aside h1:hover { color: #b794f6; }
aside nav { padding-top: 3.5rem; }
aside nav a {
  display: block;
  color: #666;
  text-decoration: none;
  padding: 0.5rem 0;
  font-size: 1.4rem;
  transition: color 0.15s;
  letter-spacing: 0.05em;
}
aside nav a:hover,
aside nav a.active { color: #fff; }
aside nav .group-title {
  color: #8B5CF6;
  font-size: 1.35rem;
  letter-spacing: 0.08em;
  padding-top: 1.2rem;
  padding-bottom: 0.25rem;
  cursor: default;
}
aside nav .group-title:hover { color: #8B5CF6; }
aside nav .sub {
  font-size: 1.3rem;
  padding-left: 0.8rem;
}

/* ====== main ====== */
main {
  margin-left: 240px;
  flex: 1;
  display: flex;
  flex-direction: column;
  transition: margin-left 0.8s ease;
}
main.expanded { margin-left: 40px; }
.masonry::before { content:''; display:block; height:0; transition:height 0.8s ease; }
main.expanded .masonry::before { height:0; }

/* ====== theme bar ====== */
#themeBar {
  display: none;
  padding: 1rem 2rem;
  background: #0d0d0d;
  border-bottom: 1px solid #1a1a1a;
  position: sticky;
  top: 0;
  z-index: 50;
}
#themeBar.visible { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
#themeBar span.model { color: #8B5CF6; margin-right: 0.5rem; font-size: 0.9rem; }
#themeBar button {
  background: #1a1a1a;
  color: #777;
  border: 1px solid #2a2a2a;
  padding: 0.35rem 0.9rem;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.85rem;
  transition: all 0.15s;
}
#themeBar button:hover,
#themeBar button.active { color: #fff; border-color: #8B5CF6; background: #1f1b2e; }

/* ====== masonry grid ====== */
.masonry {
  padding: 1.5rem 2rem;
  columns: 5 250px;
  column-gap: 0.75rem;
}
.masonry .card {
  break-inside: avoid;
  margin-bottom: 0.75rem;
  position: relative;
  cursor: pointer;
  border-radius: 4px;
  overflow: hidden;
}
.masonry .card img {
  width: 100%;
  display: block;
  transition: transform 0.3s;
}
.masonry .card:hover img { transform: scale(1.03); }
.masonry .card .overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 1.5rem 0.75rem 0.5rem;
  background: linear-gradient(transparent, rgba(0,0,0,0.6));
  color: #ccc;
  font-size: 0.75rem;
  opacity: 0;
  transition: opacity 0.2s;
}
.masonry .card:hover .overlay { opacity: 1; }

/* ====== mobile ====== */
@media (max-width:768px) {
  aside { width:33vw; padding:1.5rem .8rem; }
  aside nav a { font-size:.85rem; padding:.35rem 0; }
  aside nav .group-title { font-size:.8rem; padding-top:.8rem; }
  aside nav .sub { font-size:.75rem; padding-left:.5rem; }
  aside nav { padding-top:.3rem; }
  aside #logo { display:block; width:100px; position:fixed; left:.8rem; top:1.5rem; z-index:105; }
  main { margin-left:33vw; }
  main.expanded { margin-left:0; }
  #sidebarToggle { left:33vw; width:14px; height:44px; font-size:.55rem; }
  #sidebarToggle.shifted { left:0; }
  .masonry { padding:.5rem; columns:2 110px; column-gap:.35rem; }
main.expanded .masonry { columns:3 110px; }
  .masonry .card { margin-bottom:.35rem; }
  aside.collapsed { width:0; padding:0; overflow:hidden; }
  aside.collapsed #logo { display:none; }
  main.expanded .masonry::before { height:0; }
}

/* ====== lightbox ====== */
.lightbox {
  display: none;
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.92);
  z-index: 1000;
  align-items: center; justify-content: center;
}
.lightbox.active { display: flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 90vh;
  border-radius: 4px;
}
.lightbox .close {
  position: absolute;
  top: 1.5rem; right: 1.5rem;
  color: #fff;
  font-size: 2rem;
  cursor: pointer;
  line-height: 1;
}

/* ====== empty state ====== */
.empty {
  grid-column: 1/-1;
  text-align: center;
  color: #444;
  padding: 5rem 1rem;
  font-size: 1rem;
}
</style>
</head>

<script>
// ====== DATA ======
const data = [
  // MK2
  { model:'MK2', slug:'hayabusa', theme:'隼', colors:'荧光粉+韩国粉', files:5 },
  { model:'MK2', slug:'hayabusa', theme:'隼', colors:'荧光橙+老虎黄', files:5 },

  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'TAMIYA', colors:'粉紫', files:5, nums:[1,3,4,5,6] },
  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'TAMIYA', colors:'粉蓝', files:5, nums:[1,3,4,5,6] },
  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'TAMIYA', colors:'红蓝', files:5, nums:[1,3,4,5,6] },
  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'TAMIYA', colors:'黑银', files:5, nums:[1,3,4,5,6] },
  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'NBA-JAMES', colors:'湖人', files:5 },
  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'NBA-JAMES', colors:'热火', files:5 },
  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'NBA-JAMES', colors:'骑士红蓝', files:5 },
  { model:'装/调车盒', slug:'car-box', name:'装调车盒', theme:'NBA-JAMES', colors:'骑士红黑', files:5 },
];

function imgPath(d) {
  const t = d.theme;
  const c = d.colors;
  const slug = d.slug || d.model;
  const base = `images/${slug}/${d.name||d.model}-${t}-${c}`;
  const nums = d.nums || Array.from({length: d.files}, (_,i) => i+1);
  return nums.map(n => `${base}${n}.webp?v=2`);
}

// ====== STATE ======
let activeModel = 'all';
let activeTheme = 'all';

// ====== RENDER ======
const masonry = document.getElementById('masonry');
const themeBar = document.getElementById('themeBar');
const sidebarLinks = document.querySelectorAll('aside nav a');

function getFiltered() {
  let photos = [];
  data.forEach(d => {
    const matchModel = activeModel === 'all' || d.model === activeModel;
    const matchTheme = activeTheme === 'all' || d.theme === activeTheme;
    if (matchModel && matchTheme) {
      imgPath(d).forEach(p => photos.push({ src: p, model: d.model, theme: d.theme, colors: d.colors }));
    }
  });
  if (activeTheme === 'all') {
    for (let i = photos.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [photos[i], photos[j]] = [photos[j], photos[i]];
    }
  } else {
    photos.sort((a, b) => {
      const na = parseInt(a.src.match(/(\d+)\.webp/)?.[1] || 0);
      const nb = parseInt(b.src.match(/(\d+)\.webp/)?.[1] || 0);
      return na - nb;
    });
  }
  return photos;
}

function getThemesForModel(model) {
  const themes = new Set();
  data.filter(d => d.model === model).forEach(d => themes.add(d.theme));
  return [...themes];
}

function renderThemeBar() {
  if (activeModel === 'all') {
    themeBar.classList.remove('visible');
  } else {
    themeBar.classList.add('visible');
    themeBar.querySelector('span.model').textContent = activeModel;
    // build theme buttons
    const existing = themeBar.querySelectorAll('button');
    existing.forEach(b => b.remove());
    const themes = getThemesForModel(activeModel);
    const allBtn = document.createElement('button');
    allBtn.dataset.theme = 'all';
    allBtn.textContent = '全部主题';
    allBtn.classList.toggle('active', activeTheme === 'all');
    allBtn.onclick = () => { activeTheme = 'all'; renderAll(); };
    themeBar.appendChild(allBtn);
    themes.forEach(t => {
      const btn = document.createElement('button');
      btn.dataset.theme = t;
      btn.textContent = t;
      btn.classList.toggle('active', activeTheme === t);
      btn.onclick = () => { activeTheme = t; renderAll(); };
      themeBar.appendChild(btn);
    });
  }
}

function renderAll() {
  renderThemeBar();
  const photos = getFiltered();
  masonry.innerHTML = '';
  if (photos.length === 0) {
    masonry.innerHTML = '<div class="empty">暂无照片，敬请期待</div>';
    return;
  }
  photos.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <img src="${p.src}" alt="${p.model} ${p.theme} ${p.colors}" loading="lazy">
      <div class="overlay">${p.model} ${p.theme} · ${p.colors}</div>
    `;
    card.onclick = () => {
      document.getElementById('lightboxImg').src = p.src;
      document.getElementById('lightbox').classList.add('active');
    };
    masonry.appendChild(card);
  });
}

// ====== Logo animation (mask reveal + breathing glow) ======
document.querySelectorAll('#maskLayer .char').forEach(el => {
  let len = 0;
  if (el.tagName === 'path') {
    len = el.getTotalLength();
  } else if (el.tagName === 'polygon') {
    const pts = el.getAttribute('points').split(/[ ,]+/).map(Number);
    for (let i = 0; i < pts.length - 2; i += 2) {
      len += Math.hypot(pts[i+2]-pts[i], pts[i+3]-pts[i+1]);
    }
    len += Math.hypot(pts[0]-pts[pts.length-2], pts[1]-pts[pts.length-1]);
  }
  el.setAttribute('stroke-dasharray', len);
  el.setAttribute('stroke-dashoffset', len);
});
setTimeout(() => {
  const logo = document.getElementById('logo');
  logo.classList.add('done');
  setTimeout(() => logo.classList.add('breathing'), 1800);
}, 3200);

// ====== Logo click = show all ======
document.getElementById('logo').onclick = () => {
  activeModel = 'all';
  activeTheme = 'all';
  sidebarLinks.forEach(l => l.classList.remove('active'));
  renderAll();
};

// ====== SIDEBAR CLICKS ======
sidebarLinks.forEach(a => {
  a.onclick = e => {
    e.preventDefault();
    if (!a.dataset.model) return; // group-title, ignore
    activeModel = a.dataset.model;
    activeTheme = 'all';
    sidebarLinks.forEach(l => l.classList.remove('active'));
    a.classList.add('active');
    renderAll();
  };
});

// ====== Sidebar toggle ======
function toggleSidebar() {
  const btn = document.getElementById('sidebarToggle');
  const aside = document.querySelector('aside');
  const main = document.querySelector('main');
  const nav = aside.querySelector('nav');
  const collapsed = aside.classList.toggle('collapsed');
  main.classList.toggle('expanded');
  btn.classList.toggle('shifted');
  btn.innerHTML = collapsed ? '&#9654;' : '&#9664;';
  nav.style.transitionDelay = collapsed ? '0s' : '0.2s';
}

// initial render
renderAll();
</script>
