svg, .btn { z-index:1; }
.desk-svg { width:95vw; }
.mob-svg { display:none; width:190vw; transform:translateY(-25vh); }
.mob-svg .char { animation:draw 0.8s ease forwards; }
.mob-svg .char.done { stroke:#8B5CF6; transition:stroke 0.5s; }

.mob-svg .char:nth-child(4){animation-delay:0.5s}
.mob-svg .char:nth-child(5){animation-delay:1.4s}
.mob-svg .char:nth-child(6){animation-delay:0.2s}
.mob-svg .char:nth-child(7){animation-delay:0.8s}
.mob-svg .char:nth-child(8){animation-delay:1.1s}
.mob-svg .char:nth-child(9){animation-delay:2.3s}

.char { fill:#0a0a0a; stroke:#fff; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; animation:draw 0.8s ease forwards; }

.fly { fill:none; stroke:#fff; stroke-width:4; stroke-linecap:round; stroke-linejoin:round; opacity:0; }
.arc { fill:none; stroke:#fff; stroke-width:3; stroke-linecap:round; stroke-linejoin:round; }

#logoGroup.glow, #logoGroupMob.glow { animation:glowPulse 3s ease-in-out infinite; }
.btn { padding:.7rem 2.2rem; border:none; background:transparent; color:#c4b5fd; font-family:"Smiley Sans Oblique",sans-serif; font-size:1rem; letter-spacing:.18em; cursor:pointer; border-radius:999px; position:fixed; bottom:12vh; left:50%; transform:translateX(-50%); opacity:0; box-shadow:0 0 20px rgba(139,92,246,0.5),0 0 60px rgba(139,92,246,0.15),inset 0 0 20px rgba(139,92,246,0.1); }
.btn.show { animation:btnIn 0.8s ease-out forwards; }
.btn:hover { color:#fff; box-shadow:0 0 30px rgba(139,92,246,0.7),0 0 80px rgba(139,92,246,0.25),inset 0 0 30px rgba(139,92,246,0.15); }
@keyframes btnIn { from{opacity:0;transform:translateX(-50%) translateY(18px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }

  let len = 0;
  if (el.tagName === 'path') {
    len = el.getTotalLength();
  } else if (el.tagName === 'polygon') {
    const pts = el.getAttribute('points').split(/[ ,]+/).map(Number);
    for (let i = 0; i < pts.length - 2; i += 2) {
      len += Math.hypot(pts[i+2]-pts[i], pts[i+3]-pts[i+1]);
    }
    len += Math.hypot(pts[0]-pts[pts.length-2], pts[1]-pts[pts.length-1]);
  }
  el.setAttribute('stroke-dasharray', len);
  el.setAttribute('stroke-dashoffset', len);
});

const startT = performance.now();

function animateFlyLine(line, delay, dur) {
  const pts = line.getAttribute('points').split(/[ ,]+/).map(Number);
  const fx = pts[0], fy = pts[1], lx = pts[pts.length-2], ly = pts[pts.length-1];
  const dx = lx - fx, dy = ly - fy;
  const len = Math.sqrt(dx*dx+dy*dy) || 1;
  const ndx = dx/len, ndy = dy/len;
  const dist = 5000;

  function fly(now) {
    const t = (now - startT - delay) / dur;
    if (t < 0) { requestAnimationFrame(fly); return; }
    if (t > 1) { line.style.opacity = '0'; return; }
    let pp;
    if (t < 0.1) { pp = t / 0.1 * 0.08; }
    else if (t < 0.9) { pp = 0.08 + (t-0.1)/0.8 * 0.84; }
    else { pp = 0.92 + (t-0.9)/0.1 * 0.08; }
    const pos = -dist + pp * dist * 2;
    line.setAttribute('transform', `translate(${ndx*pos},${ndy*pos})`);
    line.style.opacity = t < 0.08 ? t/0.08*0.6 : t > 0.85 ? (1-(t-0.85)/0.15)*0.6 : 0.6;
    requestAnimationFrame(fly);
  }
  requestAnimationFrame(fly);
}

// Auto-assign fly lines to nearest char
const charEls = document.querySelectorAll('.desk-svg .char');
const charCenters = [];
charEls.forEach(el => {
  const b = el.getBBox();
  charCenters.push({ cx: b.x+b.width/2, cy: b.y+b.height/2 });
});

const lineAssignments = [];
document.querySelectorAll('.desk-svg .fly').forEach(line => {
  const pts = line.getAttribute('points').split(/[ ,]+/).map(Number);
  let sx=0, sy=0, n=0;
  for (let i=0; i<pts.length; i+=2) { sx+=pts[i]; sy+=pts[i+1]; n++; }
  const mx=sx/n, my=sy/n;
  let best=0, bestD=Infinity;
  charCenters.forEach((c,i) => {
    const d=Math.hypot(mx-c.cx, my-c.cy);
    if (d<bestD) { bestD=d; best=i; }
  });
  if (!lineAssignments[best]) lineAssignments[best]=[];
  lineAssignments[best].push(line);
});

const lDelays = [2400,1800,1500,300,1200,0,600,900,2100];
lineAssignments.forEach((lines, ci) => {
  if (!lines) return;
  lines.slice(0,3).forEach((line,i) => {
    animateFlyLine(line, lDelays[ci] + i*75, 750);
  });
});

// Per-char purple
const charDelays = [2400,1800,1500,300,1200,0,600,900,2100];
document.querySelectorAll('.desk-svg .char').forEach((ch,i) => {
  setTimeout(() => ch.classList.add('done'), charDelays[i]+800);
});

// Arcs
document.querySelectorAll('.arc').forEach(arc => {
  const len = arc.getTotalLength();
  arc.setAttribute('stroke-dasharray', len);
  arc.setAttribute('stroke-dashoffset', len);
  arc.style.opacity = '0';

  const b = arc.getBBox();
  const ax=b.x+b.width/2, ay=b.y+b.height/2;
  let best=0, bestD=Infinity;
  charCenters.forEach((c,i) => {
    const d=Math.hypot(ax-c.cx, ay-c.cy);
    if (d<bestD) { bestD=d; best=i; }
  });
  const charStart = lDelays[best];
  const arcStart = Math.max(0, charStart-400);
  const arcDur = 400;

  function animArc(now) {
    const elapsed = now-startT-arcStart;
    if (elapsed<0) { requestAnimationFrame(animArc); return; }
    const t=Math.min(1,elapsed/arcDur);
    arc.setAttribute('stroke-dashoffset', len*(1-t));
    arc.style.opacity = t<0.2 ? t/0.2 : 0.8;
    if (t<1) requestAnimationFrame(animArc);
    else { arc.style.opacity='0'; arc.style.transition='opacity 0.3s'; }
  }
  requestAnimationFrame(animArc);
});

setTimeout(() => { document.getElementById('logoGroup').classList.add('glow'); document.getElementById('logoGroupMob').classList.add('glow'); }, 3000);
setTimeout(() => document.getElementById('enterBtn').classList.add('show'), 3200);

// Particle background
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');
  let w,h;function R(){w=c.width=window.innerWidth;h=c.height=window.innerHeight}
  R();window.addEventListener('resize',R);
  const p=[];let mx=-1,my=-1;
  for(let i=0;i<120;i++)p.push({x:Math.random()*w,y:Math.random()*h,r:Math.random()*3+1,dx:(Math.random()-.5)*.4,dy:(Math.random()-.5)*.4,ph:Math.random()*Math.PI*2,ox:0,oy:0});
  c.addEventListener('click',e=>{mx=e.clientX;my=e.clientY});
  c.addEventListener('touchmove',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY});
  c.addEventListener('touchend',()=>{mx=-1;my=-1});
  function D(){
    x.clearRect(0,0,w,h);
    p.forEach(s=>{
      if(mx>0){const d=Math.hypot(s.x-mx,s.y-my);if(d<200){const a=Math.atan2(s.y-my,s.x-mx);const f=(200-d)/200*8;s.ox+=Math.cos(a)*f;s.oy+=Math.sin(a)*f}}
      const tx=s.x+s.ox;const ty=s.y+s.oy;
      s.x+=s.dx;s.y+=s.dy;if(s.x<0)s.x=w;if(s.x>w)s.x=0;if(s.y<0)s.y=h;if(s.y>h)s.y=0;
      s.ox*=.92;s.oy*=.92;
      s.ph+=.015;
      x.beginPath();x.arc(tx,ty,s.r,0,Math.PI*2);
      x.fillStyle='rgba(139,92,246,'+(.3+Math.sin(s.ph)*.3)+')';x.fill();
    });
    requestAnimationFrame(D);
  }
  D();
})();

// Mobile char stroke animation
(function(){
  const mChars=document.querySelectorAll('#logoGroupMob .char');
  if(!mChars.length)return;
  mChars.forEach(el=>{
    let len=0;
    if(el.tagName==='path')len=el.getTotalLength();

      const pts=el.getAttribute('points').split(/[ ,]+/).map(Number);
      for(let i=0;i<pts.length-2;i+=2)len+=Math.hypot(pts[i+2]-pts[i],pts[i+3]-pts[i+1]);
      len+=Math.hypot(pts[0]-pts[pts.length-2],pts[1]-pts[pts.length-1]);
    }
    el.setAttribute('stroke-dasharray',len);
    el.setAttribute('stroke-dashoffset',len);
  });
  const mCharDelays=[2600,2000,1700,500,1400,200,800,1100,2300];
  mChars.forEach((ch,i)=>{setTimeout(()=>ch.classList.add('done'),mCharDelays[i]+800)});
  // Glow after last letter (J: 2600+800=3400ms)
  setTimeout(()=>mChars.forEach(ch=>ch.classList.add('glow')),3450);
})();
