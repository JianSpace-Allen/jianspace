<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JIANSPACE</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #ccc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.6;
    }
    header {
      padding: 3rem 1rem;
      text-align: center;
      border-bottom: 1px solid #222;
    }
    header h1 {
      font-size: 2.5rem;
      letter-spacing: 0.3em;
      color: #8B5CF6;
    }
    header p { color: #666; margin-top: 0.5rem; }
    .gallery {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .series {
      margin-bottom: 3rem;
    }
    .series h2 {
      font-size: 1.2rem;
      color: #8B5CF6;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid #222;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 0.75rem;
    }
    .grid img {
      width: 100%;
      aspect-ratio: 3/4;
      object-fit: cover;
      border-radius: 4px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .grid img:hover {
      transform: scale(1.02);
    }
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.92);
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 4px;
    }
    .lightbox.active { display: flex; }
    footer {
      text-align: center;
      padding: 3rem 1rem;
      color: #444;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <header>
    <h1>JIANSPACE</h1>
    <p>田宫迷你四驱车 · 专业软壳喷涂</p>
  </header>

  <div class="gallery" id="gallery"></div>

  <div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
    <img id="lightboxImg" src="">
  </div>

  <footer>&copy; 2026 JIANSPACE</footer>

  <script>
    const series = [
      { name: 'MK2 隼 — 荧光粉 + 韩国粉', color: '#ec4899', images: [
        'images/hayabusa/MK2-隼-荧光粉+韩国粉1.jpg',
        'images/hayabusa/MK2-隼-荧光粉+韩国粉2.jpg',
        'images/hayabusa/MK2-隼-荧光粉+韩国粉3.jpg',
        'images/hayabusa/MK2-隼-荧光粉+韩国粉4.jpg',
        'images/hayabusa/MK2-隼-荧光粉+韩国粉5.jpg'
      ]},
      { name: 'MK2 隼 — 荧光橙 + 老虎黄', color: '#f97316', images: [
        'images/hayabusa/MK2-隼-荧光橙+老虎黄1.jpg',
        'images/hayabusa/MK2-隼-荧光橙+老虎黄2.jpg',
        'images/hayabusa/MK2-隼-荧光橙+老虎黄3.jpg',
        'images/hayabusa/MK2-隼-荧光橙+老虎黄4.jpg',
        'images/hayabusa/MK2-隼-荧光橙+老虎黄5.jpg'
      ]},
      { name: 'MK2 隼 — 紫 + 薰衣草紫', color: '#a855f7', images: [
        'images/hayabusa/MK2-隼-紫+薰衣草紫1.jpg',
        'images/hayabusa/MK2-隼-紫+薰衣草紫2.jpg',
        'images/hayabusa/MK2-隼-紫+薰衣草紫3.jpg',
        'images/hayabusa/MK2-隼-紫+薰衣草紫4.jpg',
        'images/hayabusa/MK2-隼-紫+薰衣草紫5.jpg'
      ]}
    ];

    const gallery = document.getElementById('gallery');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');

    series.forEach(s => {
      const section = document.createElement('div');
      section.className = 'series';
      section.innerHTML = `<h2 style="color:${s.color}">${s.name}</h2><div class="grid"></div>`;
      const grid = section.querySelector('.grid');
      s.images.forEach(src => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = s.name;
        img.onclick = () => {
          lightboxImg.src = src;
          lightbox.classList.add('active');
        };
        grid.appendChild(img);
      });
      gallery.appendChild(section);
    });
  </script>
</body>
</html>
