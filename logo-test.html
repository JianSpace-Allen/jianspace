<head>
<meta charset="UTF-8">

<title>Logo Mask Test</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d0d0d; min-height:100vh; display:flex; align-items:center; justify-content:center; }
svg { width:190px; }
#logo .char { fill:#8B5CF6; }
#logo { filter:drop-shadow(0 0 0 transparent); transition:filter 1.8s ease; }
#logo.done { filter:drop-shadow(0 0 1px #fff) drop-shadow(0 0 3px #8B5CF6); }
@keyframes breathe { 0%,100%{filter:drop-shadow(0 0 0 transparent)} 50%{filter:drop-shadow(0 0 2px #fff) drop-shadow(0 0 4px #8B5CF6) drop-shadow(0 0 8px #a78bfa)} }
#logo.breathing { animation:breathe 3s ease-in-out infinite; will-change:filter; }
#maskLayer .char { fill:black; stroke:white; stroke-width:80; stroke-linecap:round; stroke-linejoin:round; animation:draw 0.8s ease forwards; }
#maskLayer .char:nth-child(1){animation-delay:2.4s}
#maskLayer .char:nth-child(2){animation-delay:1.8s}
#maskLayer .char:nth-child(3){animation-delay:1.5s}
#maskLayer .char:nth-child(4){animation-delay:0.3s}
#maskLayer .char:nth-child(5){animation-delay:1.2s}
#maskLayer .char:nth-child(6){animation-delay:0s}
#maskLayer .char:nth-child(7){animation-delay:0.6s}
#maskLayer .char:nth-child(8){animation-delay:0.9s}
#maskLayer .char:nth-child(9){animation-delay:2.1s}
@keyframes draw { to{stroke-dashoffset:0} }
</style>
</head>

<script>
document.querySelectorAll('#maskLayer .char').forEach(el => {
  let len = 0;
  if (el.tagName === 'path') {
    len = el.getTotalLength();
  } else if (el.tagName === 'polygon') {
    const pts = el.getAttribute('points').split(/[ ,]+/).map(Number);
    for (let i = 0; i < pts.length - 2; i += 2) {
      len += Math.hypot(pts[i+2]-pts[i], pts[i+3]-pts[i+1]);
    }
    len += Math.hypot(pts[0]-pts[pts.length-2], pts[1]-pts[pts.length-1]);
  }
  el.setAttribute('stroke-dasharray', len);
  el.setAttribute('stroke-dashoffset', len);
});
// All chars finish drawing at 2.4s + 0.8s = 3.2s
// Phase 1: fade in glow smoothly over 1.8s
// Phase 2: start breathing loop
setTimeout(() => {
  const logo = document.getElementById('logo');
  logo.classList.add('done');
  setTimeout(() => logo.classList.add('breathing'), 1800);
}, 3200);
</script>
